name: Build & Release VSIX

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build:prod

      - name: Generate PNG icon from SVG
        run: |
          npm install --no-save sharp
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          sharp(fs.readFileSync('images/icon.svg')).resize(128,128).png().toFile('images/icon.png', (err) => {
            if (err) { console.error(err); process.exit(1); }
            console.log('Icon generated.');
          });
          "

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX as artifact
        uses: actions/upload-artifact@v4
        with:
          name: a11y-mcp-vsix
          path: "*.vsix"
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only runs on version tags (e.g. v0.1.0)
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: a11y-mcp-vsix

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
          draft: false
          prerelease: false

  publish-ovsx:
    name: Publish to Open VSX Registry
    needs: build
    runs-on: ubuntu-latest
    # Only runs on version tags AND if the OVSX_PAT secret is configured
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: a11y-mcp-vsix

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish to Open VSX
        run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_PAT }}

  publish-vsce:
    name: Publish to VS Code Marketplace
    needs: build
    runs-on: ubuntu-latest
    # Only runs on version tags AND if the VSCE_PAT secret is configured
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: a11y-mcp-vsix

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-dependencies -p ${{ secrets.VSCE_PAT }}
